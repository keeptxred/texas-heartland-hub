name: Calculator validation

on:
  pull_request:
    paths:
      - "src/lib/**"
      - "src/types/**"
      - "src/data/**"
      - "src/components/**"
      - "src/pages/**"
      - "src/routes/**"
      - "package.json"
      - ".github/workflows/calculator-validation.yml"
  push:
    branches:
      - agent/chat-calculators-through-tool-56

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.12.1 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --reporter=silent

      - name: Build production application and generate routes
        run: pnpm build

      - name: Capture TypeScript diagnostics
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pnpm exec tsc --noEmit --pretty false > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          exit $status

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calculator-typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error

      - name: Stop on TypeScript failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Run calculator tests
        run: pnpm test

      - name: Lint
        run: pnpm lint
