name: Refresh Texas tax rates

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 1 * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install spreadsheet parser
        run: python -m pip install --disable-pip-version-check openpyxl==3.1.5

      - name: Download and generate statewide rates
        run: python scripts/sync_texas_tax_rates.py

      - name: Validate county coverage
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('src/data/counties.ts').read_text()
          assert 'countyCount:254' in text, 'Generated metadata does not report 254 counties'
          assert text.count('"dataSource":"Texas Comptroller PTAD"') == 254, 'Not all counties were generated'
          print('Validated all 254 counties')
          PY

      - name: Commit changed rates
        run: |
          if git diff --quiet -- src/data/counties.ts; then
            echo "No tax-rate changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/counties.ts
          git commit -m "chore: refresh Texas property tax rates"
          git push
