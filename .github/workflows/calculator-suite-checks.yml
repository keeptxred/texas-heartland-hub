name: Calculator Suite Checks

on:
  pull_request:
    paths:
      - "src/components/calculators/**"
      - "src/data/calculators.ts"
      - "src/data/remainingTexasTools.ts"
      - "src/lib/calculators/**"
      - "src/pages/tools/**"
      - "src/routes/calculatorRoutes.tsx"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/calculator-suite-checks.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
