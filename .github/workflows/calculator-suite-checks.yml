name: Calculator Suite Checks

on:
  pull_request:
    paths:
      - "src/components/calculators/**"
      - "src/data/calculators.ts"
      - "src/data/remainingTexasTools.ts"
      - "src/lib/calculators/**"
      - "src/pages/tools/**"
      - "src/routes/calculatorRoutes.tsx"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/calculator-suite-checks.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
