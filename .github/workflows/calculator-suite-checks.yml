name: Calculator Suite Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture validation diagnostics
        shell: bash
        run: |
          set +e
          bun run typecheck > typecheck.log 2>&1
          echo $? > typecheck.exit
          bun run lint > lint.log 2>&1
          echo $? > lint.exit
          bun run build > build.log 2>&1
          echo $? > build.exit
          printf '\n=== TYPECHECK ===\n'
          cat typecheck.log
          printf '\n=== LINT ===\n'
          cat lint.log
          printf '\n=== BUILD ===\n'
          cat build.log
          exit 0

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calculator-suite-diagnostics
          path: |
            typecheck.log
            typecheck.exit
            lint.log
            lint.exit
            build.log
            build.exit
          if-no-files-found: error
          retention-days: 7

      - name: Enforce validation
        shell: bash
        run: |
          test "$(cat typecheck.exit)" -eq 0
          test "$(cat lint.exit)" -eq 0
          test "$(cat build.exit)" -eq 0
