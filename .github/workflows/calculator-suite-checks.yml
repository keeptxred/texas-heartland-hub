name: Calculator Suite Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture validation diagnostics
        shell: bash
        run: |
          set +e
          bun run build > build.log 2>&1
          echo $? > build.exit
          bun run typecheck > typecheck.log 2>&1
          echo $? > typecheck.exit
          git diff --name-only --diff-filter=ACMR origin/main...HEAD | grep -E '\.(ts|tsx)$' > changed-ts-files.txt || true
          if [ -s changed-ts-files.txt ]; then
            xargs bunx eslint < changed-ts-files.txt > lint.log 2>&1
            echo $? > lint.exit
          else
            echo "No changed TypeScript files to lint." > lint.log
            echo 0 > lint.exit
          fi
          printf '\n=== BUILD ===\n'
          cat build.log
          printf '\n=== TYPECHECK ===\n'
          cat typecheck.log
          printf '\n=== CHANGED-FILE LINT ===\n'
          cat lint.log
          exit 0

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calculator-suite-diagnostics
          path: |
            build.log
            build.exit
            typecheck.log
            typecheck.exit
            lint.log
            lint.exit
            changed-ts-files.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce validation
        shell: bash
        run: |
          test "$(cat build.exit)" -eq 0
          test "$(cat typecheck.exit)" -eq 0
          test "$(cat lint.exit)" -eq 0
