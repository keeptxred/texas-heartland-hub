name: Calculator Suite Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture typecheck diagnostics
        shell: bash
        run: |
          set +e
          bun run typecheck > typecheck.log 2>&1
          echo $? > typecheck.exit
          cat typecheck.log
          exit 0

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calculator-typecheck-diagnostics
          path: |
            typecheck.log
            typecheck.exit
          if-no-files-found: error
          retention-days: 7

      - name: Enforce typecheck
        run: test "$(cat typecheck.exit)" -eq 0

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
